<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - Johnny Ahmad</title>
  
  <link href="https://fonts.googleapis.com/css2?family=K2D:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>


  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold" href="index.html" style="color: var(--mine-shaft)">Portfolio</a>
      
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>

      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="about.html">About</a></li>
          <li class="nav-item"><a class="nav-link" href="projects.html">Projects</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
      </div>
    </div>
  </nav>


  <section class="container py-5 my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8 text-center">
        <h1 class="display-4 fw-light mb-3" style="color: var(--mine-shaft)">Let's work together</h1>
        <p class="lead mb-5" style="color: var(--mine-shaft)">
          Have a project in mind? Feel free to reach out. I'd love to hear from you.
        </p>
      </div>
    </div>
  </section>


  <section class="container pb-5 mb-5">
    <div class="row justify-content-center">
      <div class="col-lg-6">
        <form id="contactForm" class="p-4 rounded-3 shadow-sm" style="background-color: var(--white)">
          
          <!-- Name -->
          <div class="mb-4">
            <label for="name" class="form-label fw-bold">Name</label>
            <input 
              type="text" 
              class="form-control p-3" 
              id="name"
              name="from_name"
              required
            >
          </div>


          <div class="mb-4">
            <label for="email" class="form-label fw-bold">Email</label>
            <input 
              type="email" 
              class="form-control p-3" 
              id="email"
              name="from_email"
              required
            >
          </div>


          <div class="mb-4">
            <label for="message" class="form-label fw-bold">Message</label>
            <textarea 
              class="form-control p-3" 
              id="message"
              name="message"
              rows="6"
              required
            ></textarea>
          </div>


          <button type="submit" class="btn btn-dark w-100 py-3 fw-bold">
            Send Message
          </button>
        </form>

      </div>
    </div>
  </section>


<footer class="py-5">
  <div class="container rounded-4 p-5 text-center" style="background-color: var(--silver-chalice)">

      <h2 class="display-5 fw-light mb-3" style="color: var(--mine-shaft)">Let's talk</h2>
      <p class="mb-4" style="color: var(--mine-shaft)">
        Feel free to contact me if you have any questions or want to work on a project together
      </p>
      <a href="contact.html">
        <button class="btn btn-dark px-5 py-2">Contact</button>
      </a>

      <div class="mt-5">
          <a href="https://github.com/314141515" target="_blank" class="text-dark mx-2 fs-4" aria-label="GitHub">
            <i class="bi bi-github"></i>
          </a>
          <a href="https://www.linkedin.com/in/khalid-ahmad-multimediedesigner/" target="_blank" class="text-dark mx-2 fs-4" aria-label="LinkedIn">
            <i class="bi bi-linkedin"></i>
          </a>
      </div>

      <p class="mt-4 small text-muted">Copyright © 2026 Johnny Ahmad</p>

  </div>
</footer>


  <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

  <script>

    (function(){
      emailjs.init("evjVAKp5cfanedM_4");
    })();


    document.getElementById('contactForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const submitBtn = this.querySelector('button[type="submit"]');
      const originalText = submitBtn.textContent;
      

      submitBtn.textContent = 'Sender...';
      submitBtn.disabled = true;
      

      emailjs.sendForm('service_89aap2g', 'template_0ui91qm', this)
        .then(function(response) {
          console.log('SUCCESS!', response.status, response.text);
          alert('Tak for din besked! Jeg vender tilbage hurtigst muligt.');
          document.getElementById('contactForm').reset();
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        }, function(error) {
          console.log('FAILED...', error);
          alert('Der skete en fejl. Prøv venligst igen eller kontakt mig direkte på email.');
          submitBtn.textContent = originalText;
          submitBtn.disabled = false;
        });
    });
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
